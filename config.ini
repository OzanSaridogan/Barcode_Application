; ============================================================
;  BARKOD UYGULAMASI AYARLARI
;  Bu dosyayi Not Defteri ile acip degistirebilirsiniz.
;  Kod bilgisi gerekmez. Degeri "=" isaretinin sagina yazin.
; ============================================================

[barkod]
; Her barkodun basina eklenen SABIT onek.
onek = 81275000

; Fiyati barkod verisine cevirme carpani.
carpan = 100

; Kurus alani en az kac haneye sifirla tamamlansin.
kurus_hane = 5

; X ebadi (Modul genisligi): 0,125mm = 1 nokta (5 mils at 203 DPI)
modul_genislik = 1

; Barkod yuksekligi: 10,51 mm x 8 = 84,08 ≈ 84 nokta (gerçek 9,38mm)
yukseklik = 84

; Barkodun altina insan-okuyabilir rakam yazilsin mi?
altyazi = hayir

[etiket]
; Yazicinin cozunurlugu. Sizin yaziciniz 203 DPI (1 mm = 8 nokta).
dpi = 203

; TEK bir etiketin olcusu, NOKTA cinsinden.
; GERCEK OLCU: 30 x 15 mm  ->  240 x 120 nokta
etiket_genislik = 240
etiket_uzunluk = 120

; Barkodun ustten konumu, NOKTA cinsinden. (Y 0,65 mm x 8 = 5.2 ≈ 5)
; Barkod her etiket icinde yatayda ortalanir
baski_genislik = 240
barkod_y = 5

[yerlesim]
; Yaziciniz bir SIRADA 3 etiket yan yana basar.
; Sol bosluk: 2mm x 8 = 16 nokta
; Sutunlar arasi: 3mm x 8 = 24 nokta
; Dikey adet: 1 (tek sira)
; Dikey bosluk: 0mm x 8 = 0 nokta
yatay_sayim = 3
sol_bosluk = 16
yatay_bosluk = 24
dikey_adet = 1
dikey_bosluk = 0

[cerceve]
; Yuvarlak koseli cerceve: dikey yaricap 1mm, yatay yaricap 1mm
; Cerceve 2mm kalintida
; Etiket icinden 1mm bosluk (1mm x 8 = 8 nokta)
etkin = hayir
kalinlik = 2
yuvarlaklik = 8
bosluk = 8

[buyuk_yazi]
; Etiketin altindaki yazi: "ANGEL [FIYAT] TL" (orn: ANGEL 190 TL)
; ZEBRA 0, 6.1pt bold, %144 ölçeklendirmesi
; Koordinatlar:
;   X: 4,57 mm x 8 = 36,56 ≈ 37 nokta
;   Y: 11,84 mm x 8 = 94,72 ≈ 95 nokta
;   Genislik: 18,27 mm x 8 = 146,16 ≈ 146 nokta
;   Yukseklik: 2,63 mm x 8 = 21,04 ≈ 21 nokta
etkin = evet
x = 37
y = 95
genislik = 146
yukseklik = 21
; Font: ZEBRA 0, 6.1pt x 144% = 25 nokta
font_yukseklik = 25
font_genislik = 25
hizalama = orta
son_ek = TL

[barcode_konum]
; Barkodun tam konum ve boyut ayarlari
; Etiketin ortasina yerlesen barkod icin soldan/ustten bosluklar.
; 240x120 etiket icin: x = (240 - 178) / 2 = 31, y = (120 - 84) / 2 = 18
barcode_x = 31
barcode_y = 18
barcode_genislik = 178
barcode_yukseklik = 84

[yazici]
; Baglanti turu: dosya | ag | windows
;   dosya   = ZPL dosyasi olarak kaydeder (yazici olmadan test icin ideal)
;   ag      = Yazicinin IP adresine dogrudan gonderir (9100 portu)
;   windows = Windows'ta yuklu yaziciya ham veri gonderir (USB yazici)
baglanti = windows

; "ag" secildiginde kullanilir:
ag_ip = 192.168.1.50
ag_port = 9100

; "windows" secildiginde kullanilir. Yazicinin Windows'taki tam adi.
; (Denetim Masasi > Aygitlar ve Yazicilar altinda gorunen ad)
windows_yazici_adi = ZDesigner ZD220-203dpi ZPL

; "dosya" secildiginde ZPL dosyalarinin kaydedilecegi klasor.
cikti_klasoru = ./cikti